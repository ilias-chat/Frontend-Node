# Deploy TRWM-backend (Express) to Vercel using the Vercel CLI.
#
# Required GitHub repository secrets (Settings → Secrets and variables → Actions → Secrets):
#   VERCEL_TOKEN        Vercel access token (Vercel → Account Settings → Tokens)
#   VERCEL_ORG_ID       From `vercel link` output or .vercel/project.json ("orgId")
#   VERCEL_PROJECT_ID   From `vercel link` output or .vercel/project.json ("projectId")
#
# Set runtime env vars (MONGO_URI, FIREBASE_SERVICE_ACCOUNT_JSON, API_FOOTBALL_KEY,
# GROK_API_KEY, FRONTEND_ORIGIN) in the Vercel Project → Settings → Environment Variables
# (Production), NOT here — Vercel injects them into the serverless function at runtime.

name: Deploy to Vercel

on:
  push:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: vercel-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Build and deploy to Vercel (production)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Verify Vercel configuration
        run: |
          set -euo pipefail
          if [ -z "${VERCEL_ORG_ID:-}" ] || [ -z "${VERCEL_PROJECT_ID:-}" ]; then
            echo "::error::Set VERCEL_ORG_ID and VERCEL_PROJECT_ID repository secrets."
            exit 1
          fi
          if [ -z "${{ secrets.VERCEL_TOKEN }}" ]; then
            echo "::error::Set the VERCEL_TOKEN repository secret."
            exit 1
          fi

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Pull Vercel project settings (production)
        run: vercel pull --yes --environment=production --token="${{ secrets.VERCEL_TOKEN }}"

      - name: Build project artifacts
        run: vercel build --prod --token="${{ secrets.VERCEL_TOKEN }}"

      - name: Deploy prebuilt artifacts to Vercel
        run: vercel deploy --prebuilt --prod --token="${{ secrets.VERCEL_TOKEN }}"
